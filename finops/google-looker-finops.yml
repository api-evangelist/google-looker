specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Google Looker
providerId: google-looker
publisherName: Google LLC
serviceCategory: Analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Business Intelligence
  - Analytics
  - Google Cloud
description: 'FOCUS-aligned FinOps for Google Looker (Google Cloud core): edition-based subscription with
  bundled instance, seat, and API-call entitlements, plus token-metered Conversational Analytics overages
  starting October 2026.'
sources:
  - https://cloud.google.com/looker/pricing
  - https://cloud.google.com/billing/docs
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Google Looker
  ServiceCategory: Analytics
  ProviderName: Google
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: looker_instance
    description: Production Looker instance hours billed per edition
    unit: instance-month
    aggregation: sum
    dimensions:
      - edition
      - region
  - name: standard_users
    description: Standard user seats consumed
    unit: seat
    aggregation: max
    dimensions:
      - edition
  - name: developer_users
    description: Developer user seats consumed
    unit: seat
    aggregation: max
    dimensions:
      - edition
  - name: viewer_users
    description: Viewer user seats consumed
    unit: seat
    aggregation: max
    dimensions:
      - edition
  - name: query_api_calls
    description: Query-based API calls against the Looker instance
    unit: request
    aggregation: sum
    dimensions:
      - edition
      - endpoint
  - name: admin_api_calls
    description: Admin API calls against the Looker instance
    unit: request
    aggregation: sum
    dimensions:
      - edition
      - endpoint
  - name: conversational_input_tokens
    description: Input data tokens consumed by Conversational Analytics
    unit: token
    aggregation: sum
    dimensions:
      - user_type
  - name: conversational_output_tokens
    description: Output data tokens produced by Conversational Analytics
    unit: token
    aggregation: sum
    dimensions:
      - user_type
principles:
  - name: Visibility
    description: Use Cloud Billing exports to BigQuery and the Looker admin usage panel to monitor seat,
      API, and Conversational Analytics token consumption.
  - name: Allocation
    description: Map Looker user groups and Cloud projects to consuming teams; tag projects so billed
      Looker SKUs roll up correctly to chargeback owners.
  - name: Optimization
    description: Right-size the Looker edition to API-call profile; cap viewer Data Token spend with
      governance; consolidate dev/test instances; review LookML for expensive queries.
  - name: Accountability
    description: Set Cloud Billing budgets and anomaly alerts on Looker SKUs; review monthly seat and
      token utilization vs. forecast with BI owners.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
