specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Google Looker
providerId: google-looker
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Business Intelligence
  - Analytics
  - Google Cloud
  - Embedded Analytics
description: Google Looker (Google Cloud core) is sold in three platform editions — Standard, Enterprise,
  and Embed — each with annual-commitment contact-sales pricing covering one production instance, base
  Standard and Developer user counts, and a tier-specific monthly query/admin API call quota. Per-user
  prices are not publicly listed. Conversational Analytics consumption is metered in Data Tokens with
  per-1M overage rates effective October 2026; access is unlimited within fair-use through Sept 30, 2026.
sources:
  - https://cloud.google.com/looker/pricing
plans:
  - id: google-looker-standard
    name: Standard
    type: subscription
    description: Standard edition for small organizations / teams under 50 users. Annual commitment;
      contact sales for pricing.
    entries:
      - label: Production instance
        name: instance
        type: subscription
        metric: instance
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Standard users included
        name: standard_users
        type: quota
        metric: seat
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Developer users included
        name: developer_users
        type: quota
        metric: seat
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Query-based API calls
